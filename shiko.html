<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0a0812"/>
<title>Regjistri · Shiko</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --bg:#0a0812; --surface:#141020; --surface2:#1b1528; --border:#241d33;
  --border-bright:#33294a; --text:#e8e4f0; --text-bright:#fff; --muted:#8a8295;
  --accent:#ff6b35; --green:#00d4a4; --blue:#4d9fff; --purple:#a855f7;
  --grad-accent:linear-gradient(135deg,#ff6b35,#ff9558);
  --r:18px; --sh:0 4px 20px rgba(0,0,0,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{color-scheme:dark;}
body{
  font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text);
  min-height:100vh; padding:0 0 40px; line-height:1.5;
  background-image:radial-gradient(circle at 20% 10%,rgba(255,107,53,0.06),transparent 40%),radial-gradient(circle at 80% 30%,rgba(168,85,247,0.05),transparent 40%);
}
.topbar{
  position:sticky; top:0; z-index:10;
  background:rgba(10,8,18,0.92); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border); padding:16px 18px;
  display:flex; align-items:center; gap:10px;
}
.topbar .logo-ico{color:var(--accent);font-size:1.2rem;}
.topbar h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;color:var(--text-bright);}
.topbar h1 span{background:linear-gradient(135deg,var(--accent),var(--green),var(--purple));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.viewonly-badge{margin-left:auto;font-size:0.68rem;background:rgba(77,159,255,0.15);color:var(--blue);padding:4px 10px;border-radius:20px;font-weight:600;border:1px solid rgba(77,159,255,0.3);}
.wrap{max-width:560px;margin:0 auto;padding:18px;}

/* Login / loading */
#loginScreen{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:30px;text-align:center;}
#loginScreen.hidden{display:none;}
.login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;color:#fff;}
.login-logo span{background:linear-gradient(135deg,var(--accent),var(--green),var(--purple));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.login-sub{color:var(--muted);font-size:0.9rem;max-width:320px;}
.login-btn{background:var(--grad-accent);color:#fff;border:none;padding:15px 28px;border-radius:14px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;box-shadow:0 4px 20px rgba(255,107,53,0.3);display:flex;align-items:center;gap:10px;}
.login-btn:active{transform:scale(0.97);}
.spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Search */
.search-wrap{position:relative;margin-bottom:18px;}
.search-input{
  width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.95rem;
  padding:14px 16px 14px 44px;outline:none;
}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--muted);}
.search-ico{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1.1rem;pointer-events:none;}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:var(--surface2);border:none;color:var(--muted);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:0.9rem;display:none;}
.search-clear.show{display:block;}

/* Day card */
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;}
.day-head{display:flex;align-items:center;gap:9px;margin-bottom:4px;}
.day-cal{width:44px;height:44px;border-radius:12px;background:var(--grad-accent);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;line-height:1;}
.day-cal .d{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;}
.day-cal .m{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.5px;margin-top:1px;}
.day-title{flex:1;min-width:0;}
.day-title strong{display:block;font-family:'Syne',sans-serif;font-weight:700;font-size:0.98rem;color:var(--text-bright);}
.day-title small{font-size:0.75rem;color:var(--muted);}
.day-desc{font-size:0.88rem;color:var(--text);background:var(--surface2);border-left:3px solid var(--green);border-radius:8px;padding:9px 12px;margin:12px 0;display:flex;align-items:flex-start;gap:8px;}
.workers-row{display:flex;flex-direction:column;gap:9px;margin-top:12px;}
.wkr{display:flex;align-items:center;gap:11px;}
.wkr-av{width:36px;height:36px;border-radius:50%;background:var(--grad-accent);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:0.78rem;flex-shrink:0;aspect-ratio:1/1;}
.wkr-info{flex:1;min-width:0;}
.wkr-info strong{display:block;font-size:0.88rem;color:var(--text-bright);}
.wkr-info small{font-size:0.74rem;color:var(--muted);}
.pill{display:inline-block;font-size:0.7rem;padding:4px 11px;border-radius:20px;font-weight:600;flex-shrink:0;}
.pill.full{background:rgba(0,212,164,0.15);color:var(--green);}
.pill.half{background:rgba(255,149,88,0.15);color:#ff9558;}
.pill.extra{background:rgba(168,85,247,0.15);color:var(--purple);}
.loc-tag{display:inline-flex;align-items:center;gap:4px;font-size:0.72rem;color:var(--muted);background:var(--surface2);padding:3px 9px;border-radius:8px;margin-top:2px;}

.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:0.9rem;}
.empty .big{font-size:2.5rem;margin-bottom:10px;}
.refresh-note{text-align:center;font-size:0.72rem;color:var(--muted);margin-top:20px;padding:12px;}
.result-count{font-size:0.78rem;color:var(--muted);margin-bottom:14px;padding-left:2px;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">Regjistri<span>.Punës</span></div>
  <div id="loginState">
    <div class="login-sub" style="margin-bottom:20px">Faqe vetëm për shikim.<br>Hyni me llogarinë Google për të parë të dhënat.</div>
    <button class="login-btn" onclick="doLogin()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 11v2h5.5c-.3 1.4-1.6 4-5.5 4-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.7 4.9 14.6 4 12 4 7 4 3 8 3 13s4 9 9 9c5.2 0 8.6-3.6 8.6-8.8 0-.6 0-1-.1-1.2H12z"/></svg>
      Hyr me Google
    </button>
  </div>
  <div id="loadingState" style="display:none;flex-direction:column;align-items:center;gap:20px;">
    <div class="spinner"></div>
    <div class="login-sub" id="loadingText">Po lidhem me Google Drive...</div>
  </div>
</div>

<div class="topbar">
  <span class="logo-ico">◢</span>
  <h1>Regjistri<span>.Punës</span></h1>
  <span class="viewonly-badge">👁 Vetëm Shikim</span>
</div>

<div class="wrap">
  <div class="search-wrap" id="searchWrap" style="display:none">
    <span class="search-ico">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Kërko datën ose çfarë keni bërë..." oninput="onSearch()"/>
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
  <div id="content"></div>
</div>

<script>
const DRIVE_FILE_NAME = 'regjistri-pune-backup.json';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
const CLIENT_ID = '843359131456-qfr3m4o8pg6e38ra3imvohgflnmgmak1.apps.googleusercontent.com';
let accessToken = null, tokenClient = null;
let DATA = { workers:[], entries:[], locStatus:{} };
let searchQuery = '';

const monthNames = ['Janar','Shkurt','Mars','Prill','Maj','Qershor','Korrik','Gusht','Shtator','Tetor','Nëntor','Dhjetor'];
const monthShort = ['JAN','SHK','MAR','PRI','MAJ','QER','KOR','GUS','SHT','TET','NËN','DHJ'];
const dayNames = ['E Diel','E Hënë','E Martë','E Mërkurë','E Enjte','E Premte','E Shtunë'];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ini(n){return (n||'').split(' ').map(x=>x[0]||'').join('').slice(0,2).toUpperCase();}
function parseDate(d){const dp=(d||'').split('T')[0];if(!dp.includes('-'))return null;const[y,m,day]=dp.split('-');return {y:parseInt(y),m:parseInt(m),day:parseInt(day)};}
function dayName(d){const p=parseDate(d);if(!p)return '';const dt=new Date(p.y,p.m-1,p.day);return dayNames[dt.getDay()]||'';}
function dayBadge(e){
  if(e.dayType==='extra'){const h=e.extraHours||0;return `<span class="pill extra">⏰ ${h}h Ekstra</span>`;}
  if(e.dayType==='full')return '<span class="pill full">Ditë Plotë</span>';
  return '<span class="pill half">Gjysmë Dite</span>';
}

// ── Google login ──
function doLogin(){
  document.getElementById('loginState').style.display='none';
  document.getElementById('loadingState').style.display='flex';
  startAuth('');
}
function startAuth(prompt){
  if(typeof google==='undefined'||!google.accounts){setTimeout(()=>startAuth(prompt),400);return;}
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES,
    login_hint: localStorage.getItem('viewer_email')||'',
    callback: (resp)=>{
      if(resp.error){
        document.getElementById('loginState').style.display='block';
        document.getElementById('loadingState').style.display='none';
        return;
      }
      accessToken = resp.access_token;
      loadData();
    }
  });
  tokenClient.requestAccessToken({prompt});
}

window.addEventListener('load',()=>{
  if(localStorage.getItem('viewer_email')){
    document.getElementById('loginState').style.display='none';
    document.getElementById('loadingState').style.display='flex';
    let tries=0;
    const wait=setInterval(()=>{
      tries++;
      if(typeof google!=='undefined'&&google.accounts){clearInterval(wait);startAuth('');}
      if(tries>25){clearInterval(wait);document.getElementById('loginState').style.display='block';document.getElementById('loadingState').style.display='none';}
    },200);
  }
});

async function loadData(){
  try{
    try{
      const pr=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+accessToken}});
      if(pr.ok){const p=await pr.json();if(p.email)localStorage.setItem('viewer_email',p.email);}
    }catch(e){}
    const q=`https://www.googleapis.com/drive/v3/files?q=name%3D'${DRIVE_FILE_NAME}'%20and%20trashed%3Dfalse&spaces=drive&fields=files(id,name,modifiedTime)`;
    const fr=await fetch(q,{headers:{Authorization:'Bearer '+accessToken}});
    const fd=await fr.json();
    if(!fd.files||!fd.files.length){
      document.getElementById('content').innerHTML='<div class="empty"><div class="big">📭</div>Nuk u gjetën të dhëna në Drive.</div>';
      document.getElementById('loginScreen').classList.add('hidden');
      return;
    }
    const fileId=fd.files[0].id;
    const cr=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:'Bearer '+accessToken}});
    const data=await cr.json();
    DATA={ workers:data.workers||[], entries:data.entries||[], locStatus:data.locStatus||{} };
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('searchWrap').style.display='block';
    render();
  }catch(e){
    document.getElementById('loadingText').textContent='Gabim: '+e.message;
    setTimeout(()=>{
      document.getElementById('loginState').style.display='block';
      document.getElementById('loadingState').style.display='none';
    },1500);
  }
}

function onSearch(){
  searchQuery=document.getElementById('searchInput').value.trim().toLowerCase();
  document.getElementById('searchClear').classList.toggle('show', searchQuery.length>0);
  render();
}
function clearSearch(){
  document.getElementById('searchInput').value='';
  searchQuery='';
  document.getElementById('searchClear').classList.remove('show');
  render();
}

// Build a searchable string for a date group
function dateMatchesSearch(dateKey, entriesForDate){
  if(!searchQuery)return true;
  const p=parseDate(dateKey);
  const searchable=[
    dateKey,                                    // 2026-06-30
    p?`${p.day}/${p.m}/${p.y}`:'',              // 30/6/2026
    p?`${p.day} ${monthNames[p.m-1]}`:'',       // 30 Qershor
    p?monthNames[p.m-1]:'',                     // Qershor
    dayName(dateKey),                           // E Martë
    ...entriesForDate.map(e=>e.workerName||''), // worker names
    ...entriesForDate.map(e=>e.desc||''),       // what they did
    ...entriesForDate.map(e=>e.location||'')    // location (searchable but not shown as group)
  ].join(' ').toLowerCase();
  return searchable.includes(searchQuery);
}

function render(){
  // Group ALL entries by date
  const byDate={};
  DATA.entries.forEach(e=>{ if(e.date) (byDate[e.date]=byDate[e.date]||[]).push(e); });
  let dates=Object.keys(byDate).sort((a,b)=>(b||'').localeCompare(a||'')); // newest first

  // Filter by search
  dates=dates.filter(d=>dateMatchesSearch(d, byDate[d]));

  let html='';

  if(searchQuery){
    html+=`<div class="result-count">${dates.length} ${dates.length===1?'ditë e gjetur':'ditë të gjetura'} për "${esc(searchQuery)}"</div>`;
  }

  if(!dates.length){
    html+=`<div class="empty"><div class="big">${searchQuery?'🔍':'📅'}</div>${searchQuery?'Asgjë nuk u gjet. Provo tjetër.':'Nuk ka regjistrime ende.'}</div>`;
    document.getElementById('content').innerHTML=html;
    return;
  }

  dates.forEach(date=>{
    const dayEntries=byDate[date];
    const p=parseDate(date);
    // Shared description for the day (if all same)
    const descs=[...new Set(dayEntries.map(e=>(e.desc||'').trim()).filter(d=>d&&d!=='Punë'))];
    const sharedDesc=descs.length===1?descs[0]:null;
    // Locations worked that day (shown small, since user searches may need it)
    const locs=[...new Set(dayEntries.map(e=>e.location).filter(Boolean))];

    html+=`<div class="day-card">
      <div class="day-head">
        <div class="day-cal"><div class="d">${p?p.day:'?'}</div><div class="m">${p?monthShort[p.m-1]:''}</div></div>
        <div class="day-title">
          <strong>${dayName(date)}, ${p?p.day:''} ${p?monthNames[p.m-1]:''} ${p?p.y:''}</strong>
          <small>${dayEntries.length} punëtor${dayEntries.length>1?'ë':''}${locs.length?' · '+esc(locs.join(', ')):''}</small>
        </div>
      </div>`;

    if(sharedDesc){
      html+=`<div class="day-desc">🔨 ${esc(sharedDesc)}</div>`;
    }

    html+=`<div class="workers-row">`;
    dayEntries.forEach(e=>{
      const name=e.workerName||'?';
      const perDesc=(!sharedDesc && e.desc && e.desc.trim() && e.desc.trim()!=='Punë')?e.desc.trim():'';
      html+=`<div class="wkr">
        <div class="wkr-av">${ini(name)}</div>
        <div class="wkr-info">
          <strong>${esc(name)}</strong>
          ${perDesc?`<small>🔨 ${esc(perDesc)}</small>`:(e.workerRole?`<small>${esc(e.workerRole)}</small>`:'')}
        </div>
        ${dayBadge(e)}
      </div>`;
    });
    html+=`</div></div>`;
  });

  html+=`<div class="refresh-note">🔄 Rifresko faqen për të dhënat më të reja</div>`;
  document.getElementById('content').innerHTML=html;
}
</script>
</body>
</html>
