<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0a0812"/>
<title>Regjistri · Shiko</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --bg:#0a0812; --surface:#141020; --surface2:#1b1528; --border:#241d33;
  --border-bright:#33294a; --text:#e8e4f0; --text-bright:#fff; --muted:#8a8295;
  --accent:#ff6b35; --green:#00d4a4; --blue:#4d9fff; --purple:#a855f7;
  --grad-accent:linear-gradient(135deg,#ff6b35,#ff9558);
  --r:18px; --r-sm:12px; --sh:0 4px 20px rgba(0,0,0,0.3);
  --ease:cubic-bezier(0.22,1,0.36,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{color-scheme:dark;}
body{
  font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text);
  min-height:100vh; padding:0 0 40px; line-height:1.5;
  background-image:radial-gradient(circle at 20% 10%,rgba(255,107,53,0.06),transparent 40%),radial-gradient(circle at 80% 30%,rgba(168,85,247,0.05),transparent 40%);
}
.topbar{
  position:sticky; top:0; z-index:10;
  background:rgba(10,8,18,0.9); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border); padding:16px 18px;
  display:flex; align-items:center; gap:10px;
}
.topbar .logo-ico{color:var(--accent);font-size:1.2rem;}
.topbar h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;color:var(--text-bright);}
.topbar h1 span{background:linear-gradient(135deg,var(--accent),var(--green),var(--purple));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.viewonly-badge{margin-left:auto;font-size:0.68rem;background:rgba(77,159,255,0.15);color:var(--blue);padding:4px 10px;border-radius:20px;font-weight:600;border:1px solid rgba(77,159,255,0.3);}
.wrap{max-width:560px;margin:0 auto;padding:18px;}
.section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin:26px 0 12px;display:flex;align-items:center;gap:8px;}
.section-title:first-child{margin-top:8px;}

/* Login / loading */
#loginScreen{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:30px;text-align:center;}
#loginScreen.hidden{display:none;}
.login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;color:#fff;}
.login-logo span{background:linear-gradient(135deg,var(--accent),var(--green),var(--purple));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.login-sub{color:var(--muted);font-size:0.9rem;max-width:320px;}
.login-btn{background:var(--grad-accent);color:#fff;border:none;padding:15px 28px;border-radius:14px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;box-shadow:0 4px 20px rgba(255,107,53,0.3);display:flex;align-items:center;gap:10px;}
.login-btn:active{transform:scale(0.97);}
.spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Hero */
.hero{background:linear-gradient(135deg,rgba(255,107,53,0.15),rgba(168,85,247,0.08));border:1.5px solid var(--border-bright);border-radius:var(--r);padding:22px 20px;text-align:center;margin-bottom:6px;}
.hero-label{font-size:0.78rem;color:var(--muted);font-family:'Syne',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.hero-value{font-family:'Syne',sans-serif;font-weight:800;font-size:2.6rem;margin:6px 0;}
.hero-value.pos{color:var(--green);} .hero-value.neg{color:var(--accent);}
.hero-sub{display:flex;justify-content:center;gap:18px;font-size:0.8rem;color:var(--muted);flex-wrap:wrap;}

/* Stat grid */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:15px;text-align:center;}
.stat-ico{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin:0 auto 8px;}
.stat-val{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;}
.stat-lbl{font-size:0.72rem;color:var(--muted);margin-top:2px;}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;}
.card-row{display:flex;align-items:center;gap:12px;}
.av{width:38px;height:38px;border-radius:50%;background:var(--grad-accent);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:0.8rem;flex-shrink:0;aspect-ratio:1/1;}
.av.green{background:linear-gradient(135deg,#00d4a4,#00a880);}
.info{flex:1;min-width:0;}
.info strong{display:block;font-size:0.9rem;color:var(--text-bright);}
.info small{font-size:0.75rem;color:var(--muted);}
.amount{font-family:'DM Mono',monospace;font-weight:700;}
.amount.green{color:var(--green);} .amount.accent{color:var(--accent);} .amount.red{color:#ff5470;}

.loc-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:14px;padding:15px;margin-bottom:8px;}
.loc-card.done{border-left-color:var(--green);}
.loc-name{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:var(--text-bright);margin-bottom:10px;}
.loc-stats{display:flex;gap:20px;flex-wrap:wrap;}
.loc-stat .n{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;}
.loc-stat .l{font-size:0.68rem;color:var(--muted);text-transform:uppercase;}
.loc-bar{height:5px;background:var(--surface2);border-radius:3px;margin-top:12px;overflow:hidden;}
.loc-bar-fill{height:100%;background:var(--grad-accent);border-radius:3px;}
.loc-card.done .loc-bar-fill{background:linear-gradient(135deg,#00d4a4,#00a880);}

.pill{display:inline-block;font-size:0.7rem;padding:3px 10px;border-radius:20px;font-weight:600;margin-left:8px;}
.pill.full{background:rgba(0,212,164,0.15);color:var(--green);}
.pill.half{background:rgba(255,149,88,0.15);color:#ff9558;}
.pill.extra{background:rgba(168,85,247,0.15);color:var(--purple);}

.empty{text-align:center;padding:30px;color:var(--muted);font-size:0.85rem;}
.subtabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.subtab{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:8px 14px;border-radius:20px;font-size:0.8rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.subtab.active{background:rgba(255,107,53,0.15);border-color:var(--accent);color:var(--accent);}
.refresh-note{text-align:center;font-size:0.72rem;color:var(--muted);margin-top:24px;padding:12px;}
.month-head{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;color:var(--accent);margin:16px 0 8px;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">Regjistri<span>.Punës</span></div>
  <div id="loginState">
    <div class="login-sub" style="margin-bottom:20px">Faqe vetëm për shikim.<br>Hyni me llogarinë Google për të parë të dhënat.</div>
    <button class="login-btn" onclick="doLogin()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 11v2h5.5c-.3 1.4-1.6 4-5.5 4-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.7 4.9 14.6 4 12 4 7 4 3 8 3 13s4 9 9 9c5.2 0 8.6-3.6 8.6-8.8 0-.6 0-1-.1-1.2H12z"/></svg>
      Hyr me Google
    </button>
  </div>
  <div id="loadingState" style="display:none;flex-direction:column;align-items:center;gap:20px;">
    <div class="spinner"></div>
    <div class="login-sub" id="loadingText">Po lidhem me Google Drive...</div>
  </div>
</div>

<div class="topbar">
  <span class="logo-ico">◢</span>
  <h1>Regjistri<span>.Punës</span></h1>
  <span class="viewonly-badge">👁 Vetëm Shikim</span>
</div>

<div class="wrap" id="content"></div>

<script>
const DRIVE_FILE_NAME = 'regjistri-pune-backup.json';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
const CLIENT_ID = '843359131456-qfr3m4o8pg6e38ra3imvohgflnmgmak1.apps.googleusercontent.com';
let accessToken = null, tokenClient = null;
let DATA = { workers:[], entries:[], locStatus:{}, expenses:[], contracts:{}, payments:[], priceList:[], projectWorks:[], plannedJobs:[], offers:[] };

const monthNames = ['Janar','Shkurt','Mars','Prill','Maj','Qershor','Korrik','Gusht','Shtator','Tetor','Nëntor','Dhjetor'];

// ── Helpers (replicated from main app) ──
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ini(n){return (n||'').split(' ').map(x=>x[0]||'').join('').slice(0,2).toUpperCase();}
function fmtDate(d){if(!d)return '';if(d.includes('/')){const p=d.split('/');if(p.length===3&&p[2].length===4)return d;}const dp=d.split('T')[0];if(dp.includes('-')){const[y,m,day]=dp.split('-');if(y&&m&&day)return `${day}/${m}/${y}`;}return d;}
function monthLabel(m){if(!m)return '';const[y,mo]=m.split('-');return `${monthNames[parseInt(mo)-1]} ${y}`;}
function calcEarnings(e,wage){if(!wage||wage<=0)return 0;const hr=wage/8;let base=0;if(e.dayType==='full')base=wage;else if(e.dayType==='half')base=wage/2;return base+((e.extraHours||0)*hr*1.5);}
function calcWorkerBalance(id){const w=DATA.workers.find(x=>x.id===id);if(!w)return{earned:0,paid:0,balance:0};let earned=0;DATA.entries.filter(e=>e.workerId===id).forEach(e=>{earned+=calcEarnings(e,w.dailyWage||0);});const paid=DATA.payments.filter(p=>p.workerId===id).reduce((s,p)=>s+p.amount,0);return{earned,paid,balance:earned-paid};}
function dayBadge(e){if(e.dayType==='extra'){const h=e.extraHours||0;return `<span class="pill extra">⏰ ${h}h Ekstra</span>`;}if(e.dayType==='full')return '<span class="pill full">Plotë</span>';return '<span class="pill half">Gjysmë</span>';}

// ── Google login ──
function doLogin(){
  document.getElementById('loginState').style.display='none';
  document.getElementById('loadingState').style.display='flex';
  startAuth('');
}
function startAuth(prompt){
  if(typeof google==='undefined'||!google.accounts){
    setTimeout(()=>startAuth(prompt),400); return;
  }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES,
    login_hint: localStorage.getItem('viewer_email')||'',
    callback: (resp)=>{
      if(resp.error){
        document.getElementById('loginState').style.display='block';
        document.getElementById('loadingState').style.display='none';
        return;
      }
      accessToken = resp.access_token;
      loadData();
    }
  });
  tokenClient.requestAccessToken({prompt});
}

// Auto-connect on load if previously connected
window.addEventListener('load',()=>{
  if(localStorage.getItem('viewer_email')){
    document.getElementById('loginState').style.display='none';
    document.getElementById('loadingState').style.display='flex';
    let tries=0;
    const wait=setInterval(()=>{
      tries++;
      if(typeof google!=='undefined'&&google.accounts){clearInterval(wait);startAuth('');}
      if(tries>25){clearInterval(wait);document.getElementById('loginState').style.display='block';document.getElementById('loadingState').style.display='none';}
    },200);
  }
});

async function loadData(){
  try{
    // Save email for silent re-login
    try{
      const pr=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+accessToken}});
      if(pr.ok){const p=await pr.json();if(p.email)localStorage.setItem('viewer_email',p.email);}
    }catch(e){}
    // Find the Drive file
    const q=`https://www.googleapis.com/drive/v3/files?q=name%3D'${DRIVE_FILE_NAME}'%20and%20trashed%3Dfalse&spaces=drive&fields=files(id,name,modifiedTime)`;
    const fr=await fetch(q,{headers:{Authorization:'Bearer '+accessToken}});
    const fd=await fr.json();
    if(!fd.files||!fd.files.length){
      document.getElementById('content').innerHTML='<div class="empty">Nuk u gjetën të dhëna në Drive. Sigurohu që aplikacioni kryesor ka ruajtur të dhënat.</div>';
      document.getElementById('loginScreen').classList.add('hidden');
      return;
    }
    const fileId=fd.files[0].id;
    // Download the file content
    const cr=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:'Bearer '+accessToken}});
    const data=await cr.json();
    DATA={
      workers:data.workers||[], entries:data.entries||[], locStatus:data.locStatus||{},
      expenses:data.expenses||[], contracts:data.contracts||{}, payments:data.payments||[],
      priceList:data.priceList||[], projectWorks:data.projectWorks||[],
      plannedJobs:data.plannedJobs||[], offers:data.offers||[]
    };
    document.getElementById('loginScreen').classList.add('hidden');
    render();
  }catch(e){
    document.getElementById('loadingText').textContent='Gabim: '+e.message;
    setTimeout(()=>{
      document.getElementById('loginState').style.display='block';
      document.getElementById('loadingState').style.display='none';
    },1500);
  }
}

// ── Render everything on one page ──
let expFilter='all';
function render(){
  const now=new Date();
  const curMonth=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  // Month profit
  let monthIncome=0;
  DATA.projectWorks.filter(w=>(w.date||'').startsWith(curMonth)).forEach(w=>monthIncome+=(w.pricePerUnit||0)*(w.quantity||0));
  let monthWages=0;
  DATA.entries.filter(e=>(e.date||'').startsWith(curMonth)).forEach(e=>{const w=DATA.workers.find(x=>x.id===e.workerId);if(w)monthWages+=calcEarnings(e,w.dailyWage||0);});
  const monthExp=DATA.expenses.filter(e=>(e.date||'').startsWith(curMonth)).reduce((s,e)=>s+(e.amount||0),0);
  const monthProfit=monthIncome-monthWages-monthExp;

  // Totals
  let totalDebt=0;
  DATA.workers.forEach(w=>{const b=calcWorkerBalance(w.id);if(b.balance>0)totalDebt+=b.balance;});
  const allLocs=[...new Set(DATA.entries.map(e=>e.location).filter(Boolean))];
  const doneLocs=allLocs.filter(l=>DATA.locStatus[l]==='completed').length;
  const activeLocs=allLocs.length-doneLocs;
  const workDays=new Set(DATA.entries.map(e=>e.date)).size;

  let html='';

  // HERO
  html+=`<div class="hero">
    <div class="hero-label">💰 Fitimi këtë muaj (${monthNames[now.getMonth()]})</div>
    <div class="hero-value ${monthProfit>=0?'pos':'neg'}">${monthProfit>=0?'+':''}${monthProfit.toFixed(0)}€</div>
    <div class="hero-sub"><span>📥 ${monthIncome.toFixed(0)}€ të ardhura</span><span>📤 ${(monthWages+monthExp).toFixed(0)}€ dalje</span></div>
  </div>`;

  // STATS
  html+=`<div class="grid" style="margin-bottom:6px">
    <div class="stat"><div class="stat-ico" style="background:rgba(255,107,53,0.15)">🔴</div><div class="stat-val" style="color:${totalDebt>0?'var(--accent)':'var(--green)'}">${totalDebt.toFixed(0)}€</div><div class="stat-lbl">Borxh total</div></div>
    <div class="stat"><div class="stat-ico" style="background:rgba(0,212,164,0.15)">🚧</div><div class="stat-val">${activeLocs}</div><div class="stat-lbl">Vende aktive</div></div>
    <div class="stat"><div class="stat-ico" style="background:rgba(0,212,164,0.15)">✅</div><div class="stat-val">${doneLocs}</div><div class="stat-lbl">Kompletuara</div></div>
    <div class="stat"><div class="stat-ico" style="background:rgba(168,85,247,0.15)">📅</div><div class="stat-val">${workDays}</div><div class="stat-lbl">Ditë pune</div></div>
  </div>`;

  // ── VENDET ──
  html+=`<div class="section-title">📍 Vendet</div>`;
  if(!allLocs.length){
    html+=`<div class="empty">Nuk ka vende ende.</div>`;
  } else {
    // Sort: active first, then done
    const sorted=allLocs.sort((a,b)=>{
      const da=DATA.locStatus[a]==='completed'?1:0, db=DATA.locStatus[b]==='completed'?1:0;
      return da-db;
    });
    sorted.forEach(loc=>{
      const done=DATA.locStatus[loc]==='completed';
      const locEntries=DATA.entries.filter(e=>e.location===loc);
      const days=new Set(locEntries.map(e=>e.date)).size;
      const wkrs=new Set(locEntries.map(e=>e.workerId)).size;
      let income=0;
      DATA.projectWorks.filter(w=>w.location===loc).forEach(w=>income+=(w.pricePerUnit||0)*(w.quantity||0));
      html+=`<div class="loc-card ${done?'done':''}">
        <div class="loc-name">${done?'✅':'🚧'} ${esc(loc)}</div>
        <div class="loc-stats">
          <div class="loc-stat"><div class="n">${days}</div><div class="l">Ditë</div></div>
          <div class="loc-stat"><div class="n">${wkrs}</div><div class="l">Punëtorë</div></div>
          ${income>0?`<div class="loc-stat"><div class="n" style="color:var(--green)">${income.toFixed(0)}€</div><div class="l">Fituar</div></div>`:''}
        </div>
        <div class="loc-bar"><div class="loc-bar-fill" style="width:${done?100:60}%"></div></div>
      </div>`;
    });
  }

  // ── PUNËTORËT ──
  html+=`<div class="section-title">👷 Punëtorët & Borxhet</div>`;
  if(!DATA.workers.length){
    html+=`<div class="empty">Nuk ka punëtorë ende.</div>`;
  } else {
    DATA.workers.forEach(w=>{
      const b=calcWorkerBalance(w.id);
      const wDays=DATA.entries.filter(e=>e.workerId===w.id).length;
      html+=`<div class="card"><div class="card-row">
        <div class="av">${ini(w.name)}</div>
        <div class="info">
          <strong>${esc(w.name)}</strong>
          <small>${esc(w.role)||'Punëtor'} · ${w.dailyWage||0}€/ditë · ${wDays} regjistrime</small>
        </div>
        <div style="text-align:right">
          <div class="amount ${b.balance>0.01?'red':'green'}">${b.balance>0.01?b.balance.toFixed(0)+'€':'✓ Paguar'}</div>
          <small style="color:var(--muted);font-size:0.68rem">${b.balance>0.01?'borxh':''}</small>
        </div>
      </div></div>`;
    });
  }

  // ── PAGESAT (recent) ──
  html+=`<div class="section-title">💰 Pagesat e Fundit</div>`;
  const recentPays=DATA.payments.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,10);
  if(!recentPays.length){
    html+=`<div class="empty">Nuk ka pagesa ende.</div>`;
  } else {
    recentPays.forEach(p=>{
      html+=`<div class="card"><div class="card-row">
        <div class="av green">💵</div>
        <div class="info"><strong>${esc(p.workerName||'')}</strong><small>${fmtDate(p.date)}${p.forMonth?' · për '+monthLabel(p.forMonth):''}</small></div>
        <div class="amount green">${(p.amount||0).toFixed(0)}€</div>
      </div></div>`;
    });
  }

  // ── SHPENZIMET ──
  const catIcons={material:'🧱',transport:'⛽',qira:'🔧',ushqim:'🍔',tjeter:'📦'};
  const catNames={material:'Materiale',transport:'Transport',qira:'Qira/Vegla',ushqim:'Ushqim',tjeter:'Tjetër'};
  const totalExp=DATA.expenses.reduce((s,e)=>s+(e.amount||0),0);
  html+=`<div class="section-title">💸 Shpenzimet <span style="margin-left:auto;color:var(--accent);font-family:'DM Mono',monospace">${totalExp.toFixed(0)}€</span></div>`;
  const recentExp=DATA.expenses.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,15);
  if(!recentExp.length){
    html+=`<div class="empty">Nuk ka shpenzime ende.</div>`;
  } else {
    recentExp.forEach(e=>{
      html+=`<div class="card"><div class="card-row">
        <div style="font-size:1.3rem">${catIcons[e.category]||'📦'}</div>
        <div class="info"><strong>${esc(e.desc||'Shpenzim')}</strong><small>${fmtDate(e.date)} · ${catNames[e.category]||e.category}${e.location?' · '+esc(e.location):''}</small></div>
        <div class="amount accent">${(e.amount||0).toFixed(0)}€</div>
      </div></div>`;
    });
  }

  html+=`<div class="refresh-note">🔄 Rifresko faqen për të dhënat më të reja</div>`;

  document.getElementById('content').innerHTML=html;
}
</script>
</body>
</html>
